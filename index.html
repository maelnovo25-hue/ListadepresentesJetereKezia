<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Presentes - Jeter & Kezia</title>
    <style>
        /* Estilos para visualização no celular */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            background-color: #fdf8f5; 
            margin: 0; 
            padding: 10px; 
        }

        .container { 
            position: relative; 
            width: 100%; 
            max-width: 500px; /* Ajuste ideal para telas de celular */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .tabela-img { 
            width: 100%; 
            display: block; 
            border-radius: 8px;
        }
        
        /* Área de clique invisível sobre o quadrado marrom */
        .btn-presentear {
            position: absolute;
            right: 10%; 
            width: 28%;
            height: 4%;
            cursor: pointer;
            background: rgba(0,0,0,0); /* Totalmente transparente */
            z-index: 10;
        }

        /* Marcação de 'Check' sobre a bolinha de seleção */
        .check-marcado {
            position: absolute;
            left: 54.5%; 
            font-weight: bold;
            color: #5d4037; /* Marrom escuro */
            font-size: 22px;
            display: none;
            z-index: 5;
            transform: translateY(-20%);
        }

        .item-bloqueado { 
            pointer-events: none; 
            filter: grayscale(1);
            opacity: 0.6;
        }

        /* Pop-ups Estilizados */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.75); 
            display: none; justify-content: center; align-items: center; 
            z-index: 100; 
        }

        .popup { 
            background: white; padding: 25px; border-radius: 15px; 
            width: 85%; max-width: 350px; position: relative; text-align: center; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .close-btn { 
            position: absolute; top: 10px; right: 15px; 
            cursor: pointer; font-size: 20px; color: #999; 
        }

        input { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; 
        }

        button.confirmar { 
            background-color: #8b5a2b; color: white; border: none; 
            padding: 12px 25px; border-radius: 8px; cursor: pointer; 
            font-weight: bold; width: 100%; margin-top: 10px;
        }

        /* Loading simples */
        .loading { font-size: 12px; color: #666; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <img src="tabela.jpg" alt="Lista de Presentes" class="tabela-img">
    
    <div id="camada-interativa"></div>
</div>

<div id="popCadastro" class="overlay">
    <div class="popup">
        <span class="close-btn" onclick="fecharPopup('popCadastro')">×</span>
        <h3 style="color: #8b5a2b;">Agradecemos o carinho!</h3>
        <p>Você escolheu presentear com:<br><strong id="nomePresente"></strong></p>
        <input type="text" id="nomeUser" placeholder="Seu Nome Completo">
        <input type="tel" id="whatsappUser" placeholder="Seu WhatsApp (ex: 21999999999)">
        <button class="confirmar" onclick="enviarParaPlanilha()">Confirmar Presente</button>
        <div id="statusEnvio" class="loading">Enviando... aguarde.</div>
    </div>
</div>

<div id="popSucesso" class="overlay">
    <div class="popup">
        <span class="close-btn" onclick="fecharPopup('popSucesso')">×</span>
        <h3 style="color: #2e7d32;">❤ Confirmado!</h3>
        <p>Seu nome foi registrado na nossa lista. Muito obrigado por fazer parte desse momento!</p>
        <button class="confirmar" onclick="fecharPopup('popSucesso')">Fechar</button>
    </div>
</div>

<script>
    // URL do seu Google Apps Script integrada
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyOroKLmNDpA2KwAEcAMajO3T30HDxeE8L8HWruqMIXdhkg6QGDyB3EjmXSdeZbz71uDQ/exec';
    
    let itemSelecionado = "";
    let indexGlobal = -1;

    // Definição das posições dos itens (Ajuste os valores de 'top' se necessário)
    const listaItens = [
        { nome: "Guarda-roupa", top: 35.2 },
        { nome: "Mesa de Jantar", top: 40.8 },
        { nome: "Conjunto de Cadeiras", top: 46.4 },
        { nome: "Colchão Queen", top: 51.8 },
        { nome: "Geladeira", top: 57.3 },
        { nome: "Fogão", top: 62.8 },
        { nome: "Máquina de Lavar", top: 68.3 },
        { nome: "Micro-ondas", top: 73.8 },
        { nome: "Armário de Cozinha", top: 79.3 },
        { nome: "Sofá", top: 84.8 }
    ];

    function inicializar() {
        const camada = document.getElementById('camada-interativa');
        listaItens.forEach((item, index) => {
            // Botão Invisível
            const btn = document.createElement('div');
            btn.className = 'btn-presentear';
            btn.style.top = item.top + "%";
            btn.id = "btn-" + index;
            btn.onclick = () => abrirPopCadastro(item.nome, index);
            
            // Ícone de Check
            const check = document.createElement('div');
            check.className = 'check-marcado';
            check.style.top = item.top + "%";
            check.id = "check-" + index;
            check.innerHTML = "✔";

            camada.appendChild(btn);
            camada.appendChild(check);
        });
        sincronizarComPlanilha();
    }

    function abrirPopCadastro(nome, index) {
        itemSelecionado = nome;
        indexGlobal = index;
        document.getElementById('nomePresente').innerText = nome;
        document.getElementById('popCadastro').style.display = 'flex';
    }

    function fecharPopup(id) {
        document.getElementById(id).style.display = 'none';
    }

    function enviarParaPlanilha() {
        const nome = document.getElementById('nomeUser').value;
        const tel = document.getElementById('whatsappUser').value;

        if(!nome || !tel) {
            alert("Por favor, preencha seu nome e contato.");
            return;
        }

        document.getElementById('statusEnvio').style.display = 'block';

        const formData = new FormData();
        formData.append('nome', nome);
        formData.append('telefone', tel);
        formData.append('presente', itemSelecionado);

        fetch(scriptURL, { method: 'POST', body: formData })
        .then(() => {
            document.getElementById('statusEnvio').style.display = 'none';
            fecharPopup('popCadastro');
            document.getElementById('popSucesso').style.display = 'flex';
            marcarItemComoVendido(indexGlobal);
        })
        .catch(error => {
            console.error('Erro!', error.message);
            alert("Houve um erro ao salvar. Tente novamente.");
            document.getElementById('statusEnvio').style.display = 'none';
        });
    }

    function marcarItemComoVendido(index) {
        const check = document.getElementById("check-" + index);
        const btn = document.getElementById("btn-" + index);
        if(check) check.style.display = "block";
        if(btn) btn.classList.add("item-bloqueado");
    }

    function sincronizarComPlanilha() {
        // Busca na planilha os itens que já possuem nome preenchido
        fetch(scriptURL)
        .then(res => res.json())
        .then(itensJaEscolhidos => {
            listaItens.forEach((item, index) => {
                if (itensJaEscolhidos.includes(item.nome)) {
                    marcarItemComoVendido(index);
                }
            });
        });
    }

    window.onload = inicializar;
</script>

</body>
</html>
