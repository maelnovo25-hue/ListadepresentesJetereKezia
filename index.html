<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Presentes - Jeter & Kezia</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; background: #fdf8f5; font-family: sans-serif; }
        .container { position: relative; width: 100%; max-width: 600px; }
        .imagem-tabela { width: 100%; display: block; }

        /* Área de clique: Focada no botão Presentear */
        .item-area { 
            position: absolute; 
            left: 68%;       
            width: 28%;      
            height: 4.8%;    
            display: flex; 
            align-items: center; 
            cursor: pointer;
            z-index: 99; /* Garante que está no topo de tudo */
            background: rgba(0, 0, 0, 0); /* Totalmente invisível */
            -webkit-tap-highlight-color: rgba(0,0,0,0);
        }

        /* O X que aparece na bolinha */
        .marcado::before { 
            content: "X"; 
            color: #000; 
            font-size: 22px; 
            font-weight: bold; 
            position: absolute;
            left: -185%;     
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
        }

        .marcado { pointer-events: none !important; cursor: default; }

        /* Estilos do Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; -webkit-appearance: none; }
        .btn-confirmar { background: #b38b6d; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .btn-cancelar { color: #888; cursor: pointer; display: block; margin-top: 15px; text-decoration: underline; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <img src="tabela.jpg" class="imagem-tabela">
    
    <div id="Guarda-roupa" class="item-area" style="top: 36.1%;"></div>
    <div id="Mesa de Jantar" class="item-area" style="top: 41.0%;"></div>
    <div id="Conjunto de Cadeiras" class="item-area" style="top: 45.9%;"></div>
    <div id="Colchão Queen" class="item-area" style="top: 50.8%;"></div>
    <div id="Geladeira" class="item-area" style="top: 55.7%;"></div>
    <div id="Fogão" class="item-area" style="top: 60.6%;"></div>
    <div id="Máquina de Lavar" class="item-area" style="top: 65.5%;"></div>
    <div id="Micro-ondas" class="item-area" style="top: 70.4%;"></div>
    <div id="Armário de Cozinha" class="item-area" style="top: 75.3%;"></div>
    <div id="Sofá" class="item-area" style="top: 80.2%;"></div>
</div>

<div id="meuModal" class="modal">
    <div class="modal-content">
        <h3 id="itemNome"></h3>
        <form id="meuForm">
            <input type="text" id="nomeUser" placeholder="Seu Nome" required>
            <input type="tel" id="telUser" placeholder="Seu Telefone" required>
            <button type="submit" class="btn-confirmar" id="btnEnviar">CONFIRMAR RESERVA</button>
        </form>
        <span class="btn-cancelar" onclick="fecharModal()">Cancelar e Voltar</span>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyOroKLmNDpA2KwAEcAMajO3T30HDxeE8L8HWruqMIXdhkg6QGDyB3EjmXSdeZbz71uDQ/exec';

    // Carregar reservas existentes
    async function carregarReservas() {
        try {
            const res = await fetch(scriptURL);
            const reservados = await res.json();
            reservados.forEach(id => {
                const el = document.getElementById(id);
                if(el) { el.classList.add('marcado'); }
            });
        } catch (e) { console.log("Erro ao carregar"); }
    }

    // Função para abrir o modal
    function abrirModal(item) {
        document.getElementById('itemNome').innerText = item;
        document.getElementById('meuModal').style.display = 'flex';
    }

    // Função para fechar o modal
    function fecharModal() {
        document.getElementById('meuModal').style.display = 'none';
    }

    // Gerenciador de cliques infalível para celular
    document.querySelectorAll('.item-area').forEach(botao => {
        botao.addEventListener('click', function() {
            if (!this.classList.contains('marcado')) {
                abrirModal(this.id);
            }
        });
    });

    // Enviar formulário
    document.getElementById('meuForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        const item = document.getElementById('itemNome').innerText;
        btn.innerText = "Enviando...";
        btn.disabled = true;

        const dados = {
            nome: document.getElementById('nomeUser').value,
            telefone: document.getElementById('telUser').value,
            presente: item
        };

        try {
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify(dados) });
            fetch('https://formspree.io/f/mqedoegk', { method: 'POST', body: JSON.stringify(dados), headers: { 'Accept': 'application/json' } });
            
            document.querySelector('.modal-content').innerHTML = "<h3>Reservado!</h3><p>Obrigado pelo presente!</p><button class='btn-confirmar' onclick='window.location.reload()'>OK</button>";
        } catch (err) {
            alert("Erro ao salvar. Tente novamente.");
            btn.innerText = "CONFIRMAR RESERVA";
            btn.disabled = false;
        }
    });

    carregarReservas();
</script>
</body>
</html>
