<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Presentes - Jeter & Kezia</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #fdf8f5; margin: 0; padding: 10px; }
        .container { position: relative; width: 100%; max-width: 500px; }
        .tabela-img { width: 100%; display: block; border-radius: 8px; }
        
        /* Botões invisíveis sobre o marrom */
        .btn-presentear { position: absolute; right: 10%; width: 28%; height: 4%; cursor: pointer; background: rgba(0,0,0,0); z-index: 10; }
        
        /* Check verde sobre a bolinha */
        .check-marcado { position: absolute; left: 54.5%; font-weight: bold; color: #2e7d32; font-size: 24px; display: none; z-index: 5; transform: translateY(-20%); text-shadow: 1px 1px 2px white; }
        
        .item-bloqueado { pointer-events: none; filter: grayscale(1); opacity: 0.6; }
        
        /* Pop-ups */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: none; justify-content: center; align-items: center; z-index: 100; }
        .popup { background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 350px; position: relative; text-align: center; }
        .close-btn { position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 24px; color: #999; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button.confirmar { background-color: #8b5a2b; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <img src="tabela.jpg" alt="Lista de Presentes" class="tabela-img">
    <div id="camada-interativa"></div>
</div>

<div id="popCadastro" class="overlay">
    <div class="popup">
        <span class="close-btn" onclick="fecharPopup('popCadastro')">×</span>
        <h3 style="color: #8b5a2b;">Agradecemos o carinho!</h3>
        <p>Item: <strong id="nomePresente"></strong></p>
        <input type="text" id="nomeUser" placeholder="Seu Nome">
        <input type="tel" id="whatsappUser" placeholder="Seu WhatsApp">
        <button class="confirmar" onclick="enviarDados()">Confirmar Presente</button>
    </div>
</div>

<div id="popSucesso" class="overlay">
    <div class="popup">
        <span class="close-btn" onclick="fecharPopup('popSucesso')">×</span>
        <h3 style="color: #2e7d32;">❤ Confirmado!</h3>
        <p>Seu presente foi registrado com sucesso. Muito obrigado!</p>
        <button class="confirmar" onclick="fecharPopup('popSucesso')">Fechar</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyDYtesmxpKp118gSK7W0squOzPrS03frnCBqVNZzunxwggQyGObN1KNNE6vEjIQtsK2A/exec';
    
    let itemSel = ""; 
    let idxSel = -1;

    // Itens e suas posições (Top %)
    const itens = [
        { nome: "Guarda-roupa", top: 35.2 }, { nome: "Mesa de Jantar", top: 40.8 },
        { nome: "Conjunto de Cadeiras", top: 46.4 }, { nome: "Colchão Queen", top: 51.8 },
        { nome: "Geladeira", top: 57.3 }, { nome: "Fogão", top: 62.8 },
        { nome: "Máquina de Lavar", top: 68.3 }, { nome: "Micro-ondas", top: 73.8 },
        { nome: "Armário de Cozinha", top: 79.3 }, { nome: "Sofá", top: 84.8 }
    ];

    function init() {
        const camada = document.getElementById('camada-interativa');
        itens.forEach((item, i) => {
            const btn = document.createElement('div');
            btn.className = 'btn-presentear'; 
            btn.style.top = item.top + "%"; 
            btn.id = "btn-"+i;
            btn.onclick = () => { 
                itemSel = item.nome; 
                idxSel = i; 
                document.getElementById('nomePresente').innerText = item.nome; 
                document.getElementById('popCadastro').style.display='flex'; 
            };

            const chk = document.createElement('div');
            chk.className = 'check-marcado'; 
            chk.style.top = item.top + "%"; 
            chk.id = "chk-"+i; 
            chk.innerHTML = "✔";

            camada.appendChild(btn); 
            camada.appendChild(chk);
        });
        checkPlanilha();
    }

    function fecharPopup(id) { document.getElementById(id).style.display = 'none'; }

    function enviarDados() {
        const nome = document.getElementById('nomeUser').value;
        const tel = document.getElementById('whatsappUser').value;
        
        if(!nome || !tel) return alert("Por favor, preencha os campos.");

        const payload = { nome: nome, telefone: tel, presente: itemSel };

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(() => {
            fecharPopup('popCadastro');
            document.getElementById('popSucesso').style.display = 'flex';
            marcar(idxSel);
        }).catch(() => alert("Erro ao conectar com a planilha."));
    }

    function marcar(i) {
        if(document.getElementById("chk-"+i)) document.getElementById("chk-"+i).style.display = "block";
        if(document.getElementById("btn-"+i)) document.getElementById("btn-"+i).classList.add("item-bloqueado");
    }

    function checkPlanilha() {
        fetch(scriptURL)
        .then(r => r.json())
        .then(res => {
            itens.forEach((item, i) => {
                if(res.includes(item.nome)) marcar(i);
            });
        });
    }

    window.onload = init;
</script>

</body>
</html>
