<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Presentes</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; background: #fdf8f5; font-family: sans-serif; }
        .container { position: relative; width: 100%; max-width: 600px; }
        .imagem-tabela { width: 100%; display: block; }
        
        /* O X PRETO QUE VAI FICAR POR CIMA */
        .marcado { position: absolute; left: 71%; width: 23%; height: 4.2%; background: rgba(0,0,0,0.85); color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; border-radius: 5px; pointer-events: none; z-index: 10; }
        .marcado::after { content: "X"; font-size: 22px; }

        .botao-clicavel { position: absolute; left: 70%; width: 25%; height: 4.2%; cursor: pointer; background: rgba(0,0,0,0); border: none; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; border: 2px solid #b38b6d; }
        input { width: 90%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        .btn-confirmar { background: #b38b6d; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div class="container" id="lista-presentes">
    <img src="tabela.jpg" class="imagem-tabela">
    </div>

<div id="meuModal" class="modal">
    <div class="modal-content" id="conteudoModal">
        <h3 id="itemNome" style="color:#a67c52;"></h3>
        <form id="meuForm" action="https://formspree.io/f/mqedoegk" method="POST">
            <input type="hidden" name="Presente" id="inputPresente">
            <input type="text" name="Nome" placeholder="Seu Nome" required>
            <input type="tel" name="Telefone" placeholder="Seu Telefone" required>
            <button type="submit" class="btn-confirmar">CONFIRMAR</button>
        </form>
        <p onclick="fecharModal()" style="color:grey; cursor:pointer; margin-top:15px;">Cancelar</p>
    </div>
</div>

<script>
    // ==========================================
    // ÁREA DO NOIVO: MUDE PARA true PARA MARCAR COM X
    // ==========================================
    const statusItens = [
        { nome: 'Guarda-roupa', top: '36.3%', reservado: false },
        { nome: 'Mesa de Jantar', top: '41.2%', reservado: false },
        { nome: 'Conjunto de Cadeiras', top: '46.1%', reservado: false },
        { nome: 'Colchão Queen', top: '51.0%', reservado: false },
        { nome: 'Geladeira', top: '55.9%', reservado: false },
        { nome: 'Fogão', top: '60.8%', reservado: false },
        { nome: 'Máquina de Lavar', top: '65.7%', reservado: false },
        { nome: 'Micro-ondas', top: '70.6%', reservado: false },
        { nome: 'Armário de Cozinha', top: '75.5%', reservado: false },
        { nome: 'Sofá', top: '80.4%', reservado: false }
    ];
    // ==========================================

    const container = document.getElementById('lista-presentes');

    statusItens.forEach(item => {
        if (item.reservado) {
            const divX = document.createElement('div');
            divX.className = 'marcado';
            divX.style.top = item.top;
            container.appendChild(divX);
        } else {
            const btn = document.createElement('button');
            btn.className = 'botao-clicavel';
            btn.style.top = item.top;
            btn.onclick = () => abrirModal(item.nome);
            container.appendChild(btn);
        }
    });

    function abrirModal(nome) {
        document.getElementById('itemNome').innerText = nome;
        document.getElementById('inputPresente').value = nome;
        document.getElementById('meuModal').style.display = 'flex';
    }
    function fecharModal() { document.getElementById('meuModal').style.display = 'none'; }

    document.getElementById('meuForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = this.querySelector('button');
        btn.innerText = "Enviando...";
        fetch(this.action, {
            method: 'POST',
            body: new FormData(this),
            headers: { 'Accept': 'application/json' }
        }).then(() => {
            document.getElementById('conteudoModal').innerHTML = "<h3>Obrigado!</h3><p>Sua reserva foi enviada. Os noivos atualizarão o site em breve.</p><button class='btn-confirmar' onclick='location.reload()'>Fechar</button>";
        });
    };
</script>
</body>
</html>
