<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Presentes - Jeter & Kezia</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; background: #fdf8f5; font-family: sans-serif; }
        .container { position: relative; width: 100%; max-width: 600px; }
        .imagem-tabela { width: 100%; display: block; }

        /* Área de clique: Restrita APENAS ao botão marrom "Presentear" */
        .item-area { 
            position: absolute; 
            left: 70%;       /* Alinhado com o início do botão marrom */
            width: 25%;      /* Largura exata do botão marrom */
            height: 4.2%; 
            display: flex; 
            align-items: center; 
            cursor: pointer;
            z-index: 5;
            background: transparent;
            -webkit-tap-highlight-color: transparent;
        }

        /* O X que aparece quando reservado - POSICIONADO NA BOLINHA CENTRAL */
        .marcado::before { 
            content: "X"; 
            color: #000; 
            font-size: 22px; 
            font-weight: bold; 
            position: absolute;
            
            /* Ajuste para pular do botão marrom para a bolinha do meio */
            left: -62%;      /* Move o X para a coluna Selecione */
            
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        .marcado { pointer-events: none; }

        /* Estilos do Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        .btn-confirmar { background: #b38b6d; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <img src="tabela.jpg" class="imagem-tabela">
    
    <div id="Guarda-roupa" class="item-area" style="top: 36.3%;" onclick="abrirModal('Guarda-roupa')"></div>
    <div id="Mesa de Jantar" class="item-area" style="top: 41.2%;" onclick="abrirModal('Mesa de Jantar')"></div>
    <div id="Conjunto de Cadeiras" class="item-area" style="top: 46.1%;" onclick="abrirModal('Conjunto de Cadeiras')"></div>
    <div id="Colchão Queen" class="item-area" style="top: 51.0%;" onclick="abrirModal('Colchão Queen')"></div>
    <div id="Geladeira" class="item-area" style="top: 55.9%;" onclick="abrirModal('Geladeira')"></div>
    <div id="Fogão" class="item-area" style="top: 60.8%;" onclick="abrirModal('Fogão')"></div>
    <div id="Máquina de Lavar" class="item-area" style="top: 65.7%;" onclick="abrirModal('Máquina de Lavar')"></div>
    <div id="Micro-ondas" class="item-area" style="top: 70.6%;" onclick="abrirModal('Micro-ondas')"></div>
    <div id="Armário de Cozinha" class="item-area" style="top: 75.5%;" onclick="abrirModal('Armário de Cozinha')"></div>
    <div id="Sofá" class="item-area" style="top: 80.4%;" onclick="abrirModal('Sofá')"></div>
</div>

<div id="meuModal" class="modal">
    <div class="modal-content" id="conteudoModal">
        <h3 id="itemNome"></h3>
        <form id="meuForm">
            <input type="text" id="nomeUser" placeholder="Seu Nome" required>
            <input type="tel" id="telUser" placeholder="Seu Telefone" required>
            <button type="submit" class="btn-confirmar" id="btnEnviar">CONFIRMAR RESERVA</button>
        </form>
        <p onclick="fecharModal()" style="color:grey; cursor:pointer; margin-top:15px;">Cancelar</p>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyOroKLmNDpA2KwAEcAMajO3T30HDxeE8L8HWruqMIXdhkg6QGDyB3EjmXSdeZbz71uDQ/exec';

    async function carregarReservas() {
        try {
            const res = await fetch(scriptURL);
            const reservados = await res.json();
            reservados.forEach(id => {
                const el = document.getElementById(id);
                if(el) { 
                    el.classList.add('marcado'); 
                    el.onclick = null; 
                }
            });
        } catch (e) { console.error("Erro ao carregar", e); }
    }

    function abrirModal(item) {
        document.getElementById('itemNome').innerText = item;
        document.getElementById('meuModal').style.display = 'flex';
    }

    function fecharModal() { document.getElementById('meuModal').style.display = 'none'; }

    document.getElementById('meuForm').onsubmit = async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.innerText = "Salvando...";
        const item = document.getElementById('itemNome').innerText;

        const dados = {
            nome: document.getElementById('nomeUser').value,
            telefone: document.getElementById('telUser').value,
            presente: item
        };

        try {
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify(dados) });
            
            fetch('https://formspree.io/f/mqedoegk', {
                method: 'POST',
                body: JSON.stringify(dados),
                headers: { 'Accept': 'application/json' }
            });

            document.getElementById('conteudoModal').innerHTML = "<h3>Reservado!</h3><p>Obrigado pelo carinho!</p><button class='btn-confirmar' onclick='location.reload()'>Fechar</button>";
        } catch (err) {
            alert("Erro ao salvar. Tente novamente.");
            btn.innerText = "CONFIRMAR RESERVA";
        }
    };

    carregarReservas();
</script>
</body>
</html>
