<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Presentes - Jeter & Kezia</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; background: #fdf8f5; font-family: sans-serif; }
        .container { position: relative; width: 100%; max-width: 600px; }
        .imagem-tabela { width: 100%; display: block; }

        /* Área de clique: Focada no botão marrom da direita */
        .item-area { 
            position: absolute; 
            left: 70%;       
            width: 26%;      
            height: 4.2%;    
            display: flex; 
            align-items: center; 
            cursor: pointer;
            z-index: 10;
            background: transparent;
            -webkit-tap-highlight-color: transparent;
        }

        /* O X: Agora com ajuste de -62% para cair direto na bolinha central */
        .marcado::before { 
            content: "X"; 
            color: #000; 
            font-size: 22px; 
            font-weight: bold; 
            position: absolute;
            left: -62%;      /* Este valor empurra o X do botão para a bolinha */
            top: 48%;        
            transform: translate(-50%, -50%);
            z-index: 20;
        }

        .marcado { pointer-events: none !important; }

        /* Estilos do Modal (Pop-up) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        .btn-confirmar { background: #b38b6d; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-cancelar { color: #888; cursor: pointer; display: block; margin-top: 15px; font-size: 14px; text-decoration: underline; }
    </style>
</head>
