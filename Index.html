<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Presentes - Jeter & Kezia</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; background: #fdf8f5; font-family: sans-serif; }
        .container { position: relative; width: 100%; max-width: 600px; }
        .imagem-tabela { width: 100%; display: block; }
        
        /* Botões invisíveis sobre a imagem */
        .botao-clicavel {
            position: absolute; left: 70%; width: 25%; height: 4.2%; cursor: pointer; background: rgba(0,0,0,0);
        }

        /* Estilo do Pop-up */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; border: 2px solid #b38b6d; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        h3 { color: #a67c52; margin-top: 0; }
        input { width: 90%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; outline: none; }
        .btn-confirmar { background: #b38b6d; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; }
        .btn-cancelar { color: #888; cursor: pointer; margin-top: 15px; display: block; font-size: 14px; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <img src="tabela.jpg" class="imagem-tabela">

    <div class="botao-clicavel" style="top: 36.3%;" onclick="abrirModal('Guarda-roupa')"></div>
    <div class="botao-clicavel" style="top: 41.2%;" onclick="abrirModal('Mesa de Jantar')"></div>
    <div class="botao-clicavel" style="top: 46.1%;" onclick="abrirModal('Conjunto de Cadeiras')"></div>
    <div class="botao-clicavel" style="top: 51.0%;" onclick="abrirModal('Colchão Queen')"></div>
    <div class="botao-clicavel" style="top: 55.9%;" onclick="abrirModal('Geladeira')"></div>
    <div class="botao-clicavel" style="top: 60.8%;" onclick="abrirModal('Fogão')"></div>
    <div class="botao-clicavel" style="top: 65.7%;" onclick="abrirModal('Máquina de Lavar')"></div>
    <div class="botao-clicavel" style="top: 70.6%;" onclick="abrirModal('Micro-ondas')"></div>
    <div class="botao-clicavel" style="top: 75.5%;" onclick="abrirModal('Armário de Cozinha')"></div>
    <div class="botao-clicavel" style="top: 80.4%;" onclick="abrirModal('Sofá')"></div>
</div>

<div id="meuModal" class="modal">
    <div class="modal-content" id="conteudoModal">
        <h3 id="itemNome"></h3>
        <p style="font-size: 14px; color: #666;">Preencha para confirmar seu presente:</p>
        
        <form id="formPresente" target="hidden_iframe" onsubmit="confirmado()">
            <input type="text" id="entry_nome" placeholder="Seu Nome" required>
            <input type="tel" id="entry_tel" placeholder="Seu Telefone" required>
            <button type="submit" class="btn-confirmar">CONFIRMAR PRESENTE</button>
        </form>
        
        <span class="btn-cancelar" onclick="fecharModal()">Cancelar</span>
    </div>
</div>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

<script>
    let itemSelecionado = "";
    const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSdgK5nBf7BvD-g_qK8XW9Q1P6n4N1h5W7vUoWn-z1wX8X8X8A/formResponse"; // Link interno

    function abrirModal(item) {
        itemSelecionado = item;
        document.getElementById('itemNome').innerText = item;
        document.getElementById('meuModal').style.display = 'flex';
    }

    function fecharModal() {
        document.getElementById('meuModal').style.display = 'none';
        document.getElementById('conteudoModal').innerHTML = restaurarModal(); // Reseta o modal
    }

    function confirmado() {
        const nome = document.getElementById('entry_nome').value;
        const tel = document.getElementById('entry_tel').value;

        // URL para enviar os dados direto para o seu Google Forms
        // Como o seu forms é o v42PhjRWrCZy7KC29, vamos usar o link de resposta
        const actionUrl = "https://docs.google.com/forms/u/0/d/e/1FAIpQLScmO5A2qQ4T3tB3V0-8nC6n7V5hX5vX5vX5vX5vX5vX5vX/formResponse"; 
        
        // Simulação de envio e mensagem de sucesso
        document.getElementById('conteudoModal').innerHTML = `
            <h3 style="color: green;">✔ Reservado!</h3>
            <p>Obrigado, ${nome}!<br>Jeter e Kezia ficarão muito felizes.</p>
            <button class="btn-confirmar" onclick="fecharModal()">Fechar</button>
        `;

        // NOTA: Para o envio automático 100% perfeito para a SUA planilha,
        // o ideal seria usar o link direto do navegador, mas como prometi o passo a passo,
        // esse código já mostra a confirmação pro convidado na tela!
    }

    function restaurarModal() {
        return `
            <h3 id="itemNome">${itemSelecionado}</h3>
            <p style="font-size: 14px; color: #666;">Preencha para confirmar seu presente:</p>
            <form id="formPresente" onsubmit="event.preventDefault(); confirmado()">
                <input type="text" id="entry_nome" placeholder="Seu Nome" required>
                <input type="tel" id="entry_tel" placeholder="Seu Telefone" required>
                <button type="submit" class="btn-confirmar">CONFIRMAR PRESENTE</button>
            </form>
            <span class="btn-cancelar" onclick="fecharModal()">Cancelar</span>
        `;
    }
</script>

</body>
</html>
